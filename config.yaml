baseURL: "https://hugo-profile.netlify.app"
languageCode: "en-us"
title: "Hugo Profile"
theme: "hugo-profile"

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

Paginate: 3
enableRobotsTXT: true
# disqusShortname: your-disqus-shortname
# googleAnalytics: G-MEASUREMENT_ID

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
    #Dropdown menu
    # - identifier: dropdown
    #   title: Example dropdown menu
    #   name: Dropdown
    #   weight: 3
    # - identifier: dropdown1
    #   title: example dropdown 1
    #   name: example 1
    #   url: /#
    #   parent: dropdown
    #   weight: 1
    # - identifier: dropdown2
    #   title: example dropdown 2
    #   name: example 2
    #   url: /#
    #   parent: dropdown
    #   weight: 2

params:
  title: "William Kopans"
  description: Personal Website
  # staticPath: ""  # The path to serve the static files from
  favicon: "https://upload.wikimedia.org/wikipedia/en/2/27/Colby_College_seal.svg"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # color:
  #   textColor:
  #   secondaryTextColor:
  #   backgroundColor:
  #   secondaryBackgroundColor:
  #   primaryColor:
  #   secondaryColor:

  #   darkmode:
  #     textColor:
  #     secondaryTextColor:
  #     backgroundColor:
  #     secondaryBackgroundColor:
  #     primaryColor:
  #     secondaryColor:

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    # showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "William Kopans" # Brand name for the brand | default is the title variable
    disableSearch: true
    # searchPlaceholder: "Search"
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "William."
    subtitle: "Presidential Scholar at Colby College"
    content: "I love harnessing data to inform better decisions."
    image: images/WEB_TEDx_August.jpg
    bottomImage:
      enable: true
    # roundImage: true # Make hero image circular | default false
    button:
      enable: true
      name: "Resume"
      url: "https://docs.google.com/document/d/119kcPWxQyE6H5CEBuHEcTQkBnQNaCT4j/edit?usp=sharing&ouid=113395358462372117902&rtpof=true&sd=true"
      download: false
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/williamKopans
        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/william-kopans/
        # - icon: fab fa-twitter
        #   url: https://example.com
      # customIcons:
      #   - icon: /fav.png
      #     url: "https://example.com"

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/IMG_563.jpg"
    content: |-
      As an Economics major with minors in Philosophy and Data Science at Colby College, I am passionate about problem-solving and data analysis. In the summer of 2023, I will apply these skills during an internship at L.L. Bean, focusing on process automation on their Customer Satisfaction team. The following summer, I will join PwC's consultancy practice as a Start Intern.

      I am excited to explore opportunities that combine my analytical and leadership skills with my passion for research and technology. My experience conducting research at MIT and Brown, coupled with my coursework, has helped me hone my R and Python skills. I've also co-captained a world-ranked robotics team and organized student programming events, demonstrating my ability to manage complex projects and communicate effectively.

      Eager to contribute my diverse skill set and expand my knowledge in the professional world, I look forward to engaging in opportunities that align with my interests and expertise. In my free time, I enjoy pursuing creative endeavors like pottery and woodworking.
    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "R"
        - "Python"
        - "Rhino 7"
        - "Photoshop"

  # Experience
  experience:
    enable: true
    title: "Experience"
    items:
      - job: "Start Intern"
        company: "PwC"
        companyUrl: "https://www.pwc.com/"
        date: "May 2024 - Sep 2024"
        info:
            enable: true
            content: This is a future position
        content: |
            "In the summer of 2024, I will be joining PwC's consulting division in Boston."

      - job: "Process and Technology Summer Intern"
        company: "LL Bean"
        companyUrl: "https://www.llbean.com/"
        date: "May 2023 - Aug 2023"
        info:
          enable: true
          content: This is a future position
        content: |
          I will be joining L.L. Bean's Customer Satisfaction division as a Process and Technology Intern.

      - job: "Admissions Assistant"
        company: "Colby College"
        companyUrl: "https://www.colby.edu/"
        date: "Mar 2023 - Present"
        info:
          enable: false
        content: |
          I give campus tours, greet and assist visitors at the welcome desk, and provide office support. This role requires that I engage with prospective students, families, counselors, and other visitors, sharing information about Colby's intellectual environment, research opportunities, postgraduate outcomes, and extracurricular offerings.

      - job: "Research Assistant"
        company: "Brown University"
        companyUrl: "https://www.brown.edu/"
        date: "Jul 2020 - Dec 2021"
        info:
          enable: false
        content: |
          Responsible for creating functions, visualizations, as well as Shiny Apps in R to better understand paleoclimate data.
      
      - job: "Summer Intern"
        company: "McGovern Institute for Brain Research"
        companyUrl: "https://gablab.mit.edu/"
        date: "Jun 2021 - Aug 2021 "
        info:
          enable: false
        content: "Studied speech patterns of students with Autism and the effects of audiobooks on students with LDs within the Gabrieli Lab."


  # Education
  education:
    enable: true
    # title: "Custom Name"
    index: false
    items:
      - title: "Bachelor of Arts"
        school:
          name: "Colby College, Waterville ME"
          url: "https://www.colby.edu/"
        date: "2022 - 2026"
        GPA: ""
        content: |-
          Extracurricular Activities
            - Hillel (Board Member)
            - Pottery Club (Officer)
            - CFA Research Challenge
            - Math Mules
            - Consulting Group
            - Investment Group (CSIA)
            - Colby Outing Club
            
      - title: "High School Degree"
        school:
          name: "The Wheeler School"
          url: "https://www.wheelerschool.org/"
        date: "2018 - 2022"
        GPA: ""
        content: |-
          - Co-President of Student Ambassadors
          - Co-President of the Robotics Team (FIRST Robotics, Team 252)
          - Co-President of the Programming Team
          - Tennis Team
        featuredLink:
          enable: false
          name: "My academic record"
          url: "https://example.com"
      

